<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集合点</title>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, sans-serif;}
body{background:#f4f7fa; padding: 12px;}

.app{ max-width:420px; margin:auto; padding-bottom: 30px;}

/* 顶部的定位状态面板 */
.status-panel{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color: white; border-radius: 28px; padding: 24px;
  box-shadow: 0 8px 24px rgba(37,99,235,0.25); text-align: center;
}

.status-panel h1 { font-size: 22px; margin-bottom: 8px; }
.location-box { background: rgba(255,255,255,0.15); padding: 12px; border-radius: 16px; font-size: 13px; }

/* 卡片样式 */
.card{
  margin:16px 0; background:#fff;
  border-radius:24px; padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.count-header{ display:flex; justify-content:space-between; align-items:center; color:#666; margin-bottom: 15px;}
.time-inputs input {
  width: 55px; border: 1.5px solid #eee; border-radius: 10px;
  padding: 6px; text-align: center; font-size: 16px; outline: none;
}

.time{
  text-align:center; font-size:52px; font-weight:800;
  color:#2d2d2d; margin: 10px 0; letter-spacing: -1px;
}
.time.active { color:#ff3b30; }

.row{ display:flex; justify-content:space-between; text-align:center; }
.big{ font-size:24px; font-weight:700; color: #1a1a1a; margin-top:4px;}

/* 按钮 */
.btn{
  margin:10px 0; padding:18px; border:none; border-radius:20px;
  width: 100%; font-size:16px; font-weight: 700; cursor: pointer;
}
.primary{ background:#2563eb; color:#fff; box-shadow:0 8px 20px rgba(37,99,235,0.25); }
.success{ background:#34c759; color:white; margin-top: 10px; }
.secondary{ background:#fff; border:1px solid #e0e0e0; color:#666; }

/* 导航选择菜单 */
#nav-menu {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff; border-radius: 24px 24px 0 0;
  padding: 20px; z-index: 2000; box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
}
#nav-menu button {
  width: 100%; padding: 15px; margin: 5px 0; border: none;
  border-radius: 12px; background: #f0f2f5; font-weight: 600; font-size: 16px;
}
#overlay {
  display: none; position: fixed; top: 0; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.4); z-index: 1999;
}
</style>
</head>

<body>

<div class="app">
  <div class="status-panel">
    <h1>集合点</h1>
    <div class="location-box" id="loc-status">🛰️ 正在尝试获取您的位置...</div>
    <button onclick="setPoint()" style="margin-top:15px; background:#fff; color:#2563eb; border:none; padding:8px 20px; border-radius:12px; font-weight:700;">📍 记录当前为集合点</button>
  </div>

  <div class="card">
    <div class="count-header">
      <span style="font-weight:600;">设定集合时间</span>
      <div class="time-inputs">
        <input type="number" id="in-h" value="0" min="0"> 时
        <input type="number" id="in-m" value="15" min="0" max="59"> 分
      </div>
    </div>
    <div class="time" id="cd">00:15:00</div>
    <button class="btn success" onclick="startTimer()">▶ 开启倒计时</button>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <div style="color:#888; font-size:13px;">距离集合点</div>
        <div class="big" id="dist">-- m</div>
      </div>
      <div>
        <div style="color:#888; font-size:13px;">预计步行</div>
        <div class="big" id="eta">-- 分</div>
      </div>
    </div>
  </div>

  <button class="btn primary" onclick="showNavMenu()">导航回原地</button>
  <button class="btn secondary" onclick="setPoint()">重置集合点到当前位置</button>
</div>

<div id="overlay" onclick="closeNavMenu()"></div>
<div id="nav-menu">
  <div style="text-align: center; font-weight: 700; margin-bottom: 10px;">请选择手机已安装的地图</div>
  <button onclick="openMap('amap')">高德地图</button>
  <button onclick="openMap('baidumap')">百度地图</button>
  <button onclick="openMap('qqmap')">腾讯地图</button>
  <button onclick="openMap('apple')">Apple 地图 (iOS) / 系统默认</button>
  <button onclick="closeNavMenu()" style="background:none; color:#ff3b30;">取消</button>
</div>

<script>
let userLat, userLng, targetLat, targetLng, targetTime;

// 实时获取位置逻辑 (静默运行，不显示地图图片)
navigator.geolocation.watchPosition(pos => {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
  document.getElementById("loc-status").innerText = `✅ GPS 定位正常 (精度: ${Math.round(pos.coords.accuracy)}m)`;
  
  if (targetLat) {
    let d = getDistance(userLat, userLng, targetLat, targetLng);
    document.getElementById("dist").innerText = Math.floor(d) + " m";
    document.getElementById("eta").innerText = Math.max(1, Math.floor(d / 80)) + " 分";
  }
}, (err) => {
  document.getElementById("loc-status").innerText = "❌ 定位失败，请检查 GPS 是否开启";
}, { enableHighAccuracy: true });

function setPoint() {
  if (!userLat) return alert("等待 GPS 信号...");
  targetLat = userLat;
  targetLng = userLng;
  document.getElementById("loc-status").innerText = "📍 集合点位置已锁定！";
}

function startTimer() {
  const h = parseInt(document.getElementById("in-h").value) || 0;
  const m = parseInt(document.getElementById("in-m").value) || 0;
  targetTime = Date.now() + (h * 3600 + m * 60) * 1000;
  document.getElementById("cd").classList.add("active");
}

setInterval(() => {
  if (!targetTime) {
    const h = String(document.getElementById("in-h").value).padStart(2, '0');
    const m = String(document.getElementById("in-m").value).padStart(2, '0');
    document.getElementById("cd").innerText = `${h}:${m}:00`;
    return;
  }
  let diff = targetTime - Date.now();
  if (diff <= 0) { document.getElementById("cd").innerText = "00:00:00"; return; }
  let hh = Math.floor(diff / 3600000);
  let mm = Math.floor((diff % 3600000) / 60000);
  let ss = Math.floor((diff % 60000) / 1000);
  document.getElementById("cd").innerText = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}, 1000);

function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  let dLat = (lat2 - lat1) * Math.PI / 180;
  let dLng = (lng2 - lng1) * Math.PI / 180;
  let a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// 导航逻辑
function showNavMenu() {
  if (!targetLat) return alert("请先记录集合点");
  document.getElementById('nav-menu').style.display = 'block';
  document.getElementById('overlay').style.display = 'block';
}

function closeNavMenu() {
  document.getElementById('nav-menu').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
}

function openMap(type) {
  const lat = targetLat; const lng = targetLng;
  let url = "";

  switch(type) {
    case 'amap': // 高德
      url = `androidamap://viewReGeo?sourceApplication=meetingPoint&lat=${lat}&lon=${lng}&dev=0`;
      break;
    case 'baidumap': // 百度
      url = `baidumap://map/marker?location=${lat},${lng}&title=集合点`;
      break;
    case 'qqmap': // 腾讯
      url = `qqmap://map/geocoder?coord=${lat},${lng}&name=集合点`;
      break;
    case 'apple': // 苹果/通用
      url = `geo:${lat},${lng}?q=${lat},${lng}(集合点)`;
      break;
  }
  
  window.location.href = url;
  // 如果 2 秒后没反应，可能是没装 App，尝试网页版
  setTimeout(() => {
    if (type === 'amap') window.location.href = `https://uri.amap.com/marker?position=${lng},${lat}`;
  }, 2000);
  closeNavMenu();
}
</script>
</body>
</html>
