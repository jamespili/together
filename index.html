<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集合点</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, sans-serif;}
body{background:#f4f7fa; padding: 12px;}

.app{
  max-width:420px;
  margin:auto;
  min-height: 100vh;
  padding-bottom: 30px;
}

/* 地图外观 */
.map-wrap{
  position:relative;
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  border: 4px solid #fff;
  background: #fff;
}

#map{ height:280px; width: 100%; }

.top-overlay{
  position:absolute;
  top:0; left:0; right:0; height:100px;
  background:linear-gradient(to bottom,rgba(255,255,255,0.8),rgba(255,255,255,0));
  z-index:1000; padding:20px;
  pointer-events: none;
}

.title h1{ font-size:22px; font-weight:800; color: #1a1a1a; }

.place-card{
  position:absolute; bottom:12px; left:12px; right:12px;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border-radius:18px; padding:12px 16px;
  display:flex; justify-content:space-between; align-items:center;
  box-shadow:0 4px 15px rgba(0,0,0,0.08); z-index:1000;
}

/* 卡片样式 */
.card{
  margin:16px 0;
  background:#fff;
  border-radius:24px; padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.count-header{ display:flex; justify-content:space-between; align-items:center; color:#666; margin-bottom: 15px;}

.time-inputs input {
  width: 55px; border: 1.5px solid #eee; border-radius: 10px;
  padding: 6px; text-align: center; font-size: 16px; outline: none;
}

.time{
  text-align:center; font-size:52px; font-weight:800;
  color:#2d2d2d; margin: 10px 0; letter-spacing: -1px;
}
.time.active { color:#ff3b30; }

.row{ display:flex; justify-content:space-between; text-align:center; }
.big{ font-size:24px; font-weight:700; color: #1a1a1a; margin-top:4px;}

/* 按钮区域 */
.btn-group { display: flex; flex-direction: column; gap: 10px; }

.btn{
  padding:18px; border:none; border-radius:20px;
  width: 100%; font-size:16px; font-weight: 700; cursor: pointer;
}

.primary{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:#fff; box-shadow:0 8px 20px rgba(37,99,235,0.25);
}

.start-timer-btn {
  background: #34c759; color: white; padding: 12px;
  border-radius: 14px; border: none; width: 100%;
  font-size: 16px; margin-top: 10px; font-weight: 700; cursor: pointer;
}

.secondary{
  background:#fff; border:1px solid #e0e0e0; color:#666;
}

/* 简单的弹窗样式 */
#nav-menu {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff; border-radius: 24px 24px 0 0;
  padding: 20px; z-index: 2000; box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
}
#nav-menu button {
  width: 100%; padding: 15px; margin: 5px 0; border: none;
  border-radius: 12px; background: #f0f2f5; font-weight: 600;
}
#overlay {
  display: none; position: fixed; top: 0; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.4); z-index: 1999;
}
</style>
</head>

<body>

<div class="app">
  <div class="map-wrap">
    <div id="map"></div>
    <div class="top-overlay"><div class="title"><h1>集合助手</h1></div></div>
    <div class="place-card">
      <div>
        <div style="font-weight:700; font-size: 15px;">集合地点</div>
        <div style="font-size:12px;color:#888;" id="place">未锁定位置</div>
      </div>
      <button onclick="setPoint()" style="background:#f0f7ff; border:none; color:#2563eb; padding: 8px 12px; border-radius: 12px; font-weight: 700;">📍 记录</button>
    </div>
  </div>

  <div class="card">
    <div class="count-header">
      <span style="font-weight:600;">设定倒计时</span>
      <div class="time-inputs">
        <input type="number" id="in-h" value="0" min="0"> 时
        <input type="number" id="in-m" value="15" min="0" max="59"> 分
      </div>
    </div>
    <div class="time" id="cd">00:15:00</div>
    <button class="start-timer-btn" onclick="startTimer()">▶ 开启倒计时</button>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <div style="color:#888; font-size:13px;">距离</div>
        <div class="big" id="dist">-- m</div>
      </div>
      <div>
        <div style="color:#888; font-size:13px;">步行</div>
        <div class="big" id="eta">-- 分</div>
      </div>
    </div>
  </div>

  <div class="btn-group">
    <button class="btn primary" onclick="showNavMenu()">调用手机地图导航</button>
    <button class="btn secondary" onclick="setPoint()">更新当前位置</button>
  </div>
</div>

<div id="overlay" onclick="closeNavMenu()"></div>
<div id="nav-menu">
  <div style="text-align: center; font-weight: 700; margin-bottom: 10px;">选择地图应用</div>
  <button onclick="openMap('amap')">高德地图</button>
  <button onclick="openMap('qqmap')">腾讯地图</button>
  <button onclick="openMap('apple')">Apple 地图 / 系统默认</button>
  <button onclick="closeNavMenu()" style="background:none; color:#ff3b30;">取消</button>
</div>

<script>
let map, userMarker, targetMarker;
let targetLat = null, targetLng = null;
let targetTime = null;

map = L.map('map', { zoomControl: false, attributionControl: false }).setView([39.9042, 116.4074], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

navigator.geolocation.watchPosition(pos => {
  let lat = pos.coords.latitude; let lng = pos.coords.longitude;
  if (!userMarker) {
    userMarker = L.circleMarker([lat, lng], { radius: 7, color: "#fff", weight: 3, fillColor: "#007aff", fillOpacity: 1 }).addTo(map);
    map.setView([lat, lng]);
  } else { userMarker.setLatLng([lat, lng]); }
  if (targetLat) {
    let d = getDistance(lat, lng, targetLat, targetLng);
    document.getElementById("dist").innerText = Math.floor(d) + " m";
    document.getElementById("eta").innerText = Math.max(1, Math.floor(d / 80)) + " 分";
  }
}, null, { enableHighAccuracy: true });

function setPoint() {
  if (!userMarker) return alert("定位未就绪");
  let pos = userMarker.getLatLng();
  targetLat = pos.lat; targetLng = pos.lng;
  if (targetMarker) map.removeLayer(targetMarker);
  targetMarker = L.circleMarker([targetLat, targetLng], { radius: 9, color: "#fff", weight: 3, fillColor: "#ff3b30", fillOpacity: 1 }).addTo(map);
  document.getElementById("place").innerText = "位置已锁定";
}

function startTimer() {
  const h = parseInt(document.getElementById("in-h").value) || 0;
  const m = parseInt(document.getElementById("in-m").value) || 0;
  targetTime = Date.now() + (h * 3600 + m * 60) * 1000;
  document.getElementById("cd").classList.add("active");
}

setInterval(() => {
  if (!targetTime) {
    const h = String(document.getElementById("in-h").value).padStart(2, '0');
    const m = String(document.getElementById("in-m").value).padStart(2, '0');
    document.getElementById("cd").innerText = `${h}:${m}:00`;
    return;
  }
  let diff = targetTime - Date.now();
  if (diff <= 0) { document.getElementById("cd").innerText = "00:00:00"; return; }
  let hh = Math.floor(diff / 3600000);
  let mm = Math.floor((diff % 3600000) / 60000);
  let ss = Math.floor((diff % 60000) / 1000);
  document.getElementById("cd").innerText = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}, 1000);

function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  let dLat = (lat2 - lat1) * Math.PI / 180;
  let dLng = (lng2 - lng1) * Math.PI / 180;
  let a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// 导航功能
function showNavMenu() {
  if (!targetLat) return alert("请先记录集合点");
  document.getElementById('nav-menu').style.display = 'block';
  document.getElementById('overlay').style.display = 'block';
}

function closeNavMenu() {
  document.getElementById('nav-menu').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
}

function openMap(type) {
  let url = "";
  const lat = targetLat;
  const lng = targetLng;

  if (type === 'amap') {
    // 高德地图 URL Scheme
    url = `androidamap://viewReGeo?sourceApplication=meetingPoint&lat=${lat}&lon=${lng}&dev=0`;
    // 网页备用链接
    setTimeout(() => { window.location.href = `https://uri.amap.com/marker?position=${lng},${lat}&name=集合点`; }, 500);
  } else if (type === 'qqmap') {
    // 腾讯地图
    url = `qqmap://map/geocoder?coord=${lat},${lng}&name=集合点`;
  } else if (type === 'apple') {
    // Apple 地图或系统通用 geo 协议
    url = `geo:${lat},${lng}?q=${lat},${lng}(集合点)`;
  }

  window.location.href = url;
  closeNavMenu();
}
</script>
</body>
</html>
